<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm Nhạc Live & Chat 🫪</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #10b981;
            --border: #334155;
            --chat-bg: #0f172a;
            --panel-bg: #1e293b;
            --input-bg: #0f172a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        .container { 
            background: var(--container-bg); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 1200px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            border: 1px solid var(--border);
        }
        
        h2 {
            margin-top: 0;
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Giao diện Đăng nhập */
        .login-box { 
            padding: 40px 20px; 
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }
        
        input[type="text"], input[type="password"], input[type="range"] { 
            width: 100%; 
            padding: 12px 16px; 
            margin: 10px 0; 
            background: var(--input-bg);
            border: 1px solid var(--border); 
            border-radius: 10px; 
            font-size: 15px; 
            color: var(--text-main);
            transition: all 0.3s ease;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        
        button { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 10px; 
            background: linear-gradient(135deg, var(--primary), #4f46e5); 
            color: white; 
            font-weight: 600; 
            font-size: 15px;
            cursor: pointer; 
            transition: all 0.3s ease; 
            margin-top: 15px;
            font-family: 'Inter', sans-serif;
            width: 100%;
        }
        
        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .hidden { display: none !important; }

        /* Giao diện chính sau khi vào phòng */
        #main-room {
            display: flex;
            flex-direction: column;
            gap: 24px;
            text-align: left;
            flex: 1;
        }

        @media (min-width: 900px) {
            #main-room {
                flex-direction: row;
            }
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .right-panel {
            width: 100%;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        @media (min-width: 900px) {
            .right-panel {
                max-width: 380px;
            }
        }

        #header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #welcome-title {
            margin: 0;
            font-size: 1.25rem;
            color: var(--text-main);
        }

        #status { 
            font-weight: 500; 
            color: var(--accent); 
            margin: 0;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        #status::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        #player-container { 
            border-radius: 12px; 
            overflow: hidden; 
            pointer-events: none;
            background: #000;
            aspect-ratio: 16 / 9;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            position: relative;
            width: 100%;
        }
        
        #youtube-player {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }

        .control-panel { 
            padding: 20px; 
            background: var(--panel-bg); 
            border: 1px solid var(--border);
            border-radius: 12px; 
        }
        
        /* Khung Chat */
        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.02);
        }

        .chat-section { 
            display: flex;
            flex-direction: column;
            flex: 1;
            height: 100%;
            min-height: 400px;
        }
        
        .chat-box { 
            background: var(--chat-bg); 
            flex: 1;
            overflow-y: auto; 
            padding: 15px 20px; 
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .chat-message {
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 14px;
            border-radius: 8px;
            border-left: 3px solid var(--primary);
            animation: fadeIn 0.3s ease;
            word-break: break-word;
        }
        
        .chat-message strong {
            color: #60a5fa;
            margin-right: 5px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-input-row { 
            display: flex; 
            gap: 10px; 
            padding: 15px; 
            border-top: 1px solid var(--border);
            background: var(--panel-bg);
        }
        
        #chat-input { 
            margin: 0;
            border-radius: 20px;
            padding: 10px 16px;
        }
        
        .chat-input-row button {
            margin: 0;
            width: auto;
            border-radius: 20px;
            padding: 10px 20px;
            background: var(--primary);
        }
        
        .playlist-box { 
            background: var(--input-bg); 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            max-height: 150px; 
            overflow-y: auto; 
            font-size: 13px; 
            margin-top: 10px;
        }
        
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 8px; border-bottom: 1px solid var(--border); color: var(--text-muted); display: flex; align-items: center; gap: 8px;}
        li:last-child { border-bottom: none; }
        li::before { content: '🎵'; font-size: 12px; }
        
        /* Admin tools */
        #admin-tools {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            align-items: center;
        }
        #admin-tools input { margin: 0; }
        #admin-tools button { margin: 0; width: auto; white-space: nowrap; }
        
        .btn-add { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .btn-next { background: linear-gradient(135deg, #10b981, #059669); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--chat-bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎵 Trạm Phát Nhạc & Chat Live 🫪</h2>

        <form id="login-section" class="login-box" onsubmit="event.preventDefault(); joinRoom();">
            <p style="color: var(--text-muted); margin-bottom: 20px;">Vui lòng điền tên của bạn để tham gia phòng:</p>
            
            <input type="text" id="username-input" placeholder="Nhập tên của bạn vào đây..." oninput="checkAdminName(this.value)" autocomplete="username" required>
            
            <div id="password-wrapper" class="hidden">
                <input type="password" id="password-input" placeholder="Ôi chao! Admin đây rồi, nhập mật khẩu nhé! 😎" autocomplete="current-password">
            </div>

            <button type="submit">Vào Phòng Nghe Nhạc 🫪</button>
        </form>

        <div id="main-room" class="hidden">
            <div class="left-panel">
                <div id="header-info">
                    <h3 id="welcome-title"></h3>
                    <p id="status">Đang tải trình phát YouTube...</p>
                </div>
                
                <div id="player-container">
                    <div id="youtube-player"></div>
                </div>

                <div class="control-panel">
                    <div style="display:flex; justify-content: space-between; align-items:center;">
                        <label style="display: flex; align-items: center; gap: 10px; width: 100%; color: var(--text-muted);">
                            🔊 Âm lượng: 
                            <input type="range" id="volume-slider" min="0" max="100" value="50" oninput="changeVolume(this.value)" style="width: 200px;">
                        </label>
                    </div>

                    <div id="admin-tools" class="hidden">
                        <input type="text" id="song-input" placeholder="Dán link YouTube (URL hoặc ID)...">
                        <button class="btn-add" onclick="addSong()">Thêm</button>
                        <button class="btn-next" onclick="nextSong()">Qua Bài ⏭️</button>
                    </div>

                    <h4 style="margin: 20px 0 10px 0; color: var(--text-main); font-weight: 600;">📝 Danh Sách Chờ</h4>
                    <div class="playlist-box"><ul id="playlist-ui"><li>Trống</li></ul></div>
                </div>
            </div>

            <div class="right-panel">
                <div class="chat-section">
                    <div class="chat-header">
                        💬 Trò Chuyện Trực Tiếp
                    </div>
                    <div class="chat-box" id="chat-box-ui"></div>
                    <div class="chat-input-row">
                        <input type="text" id="chat-input" placeholder="Nhập tin nhắn..." onkeypress="if(event.key === 'Enter') sendChat()">
                        <button onclick="sendChat()">Gửi</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <script>
        const socket = io();
        let player;
        let myRole = '';
        let initialVideoId = 'M7lc1UVf-VE';

        // Tự động kiểm tra tên để hiện mật khẩu
        function checkAdminName(name) {
            // Dùng toLowerCase() để dù nhập nthdat hay NTHDAT thì đều hiểu là ông chủ
            if (name.trim().toLowerCase() === 'nthdat') {
                document.getElementById('password-wrapper').classList.remove('hidden');
            } else {
                document.getElementById('password-wrapper').classList.add('hidden');
                document.getElementById('password-input').value = ''; // Xóa trắng mật khẩu nếu đổi tên khác
            }
        }

        // Gửi thông tin đăng nhập lên server
        function joinRoom() {
            const name = document.getElementById('username-input').value;
            const password = document.getElementById('password-input').value;
            const isAdmin = name.trim().toLowerCase() === 'nthdat';

            if(!name.trim()) {
                alert("Vui lòng nhập tên trước đã nha ông chủ! 🫪");
                return;
            }

            socket.emit('joinRoom', { name, isAdmin, password });
        }

        // Nhận kết quả xác thực từ server
        socket.on('authResult', (res) => {
            if (res.success) {
                myRole = res.role;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-room').classList.remove('hidden');
                document.getElementById('welcome-title').innerText = myRole === 'admin' ? "👑 Bảng Điều Khiển Của Admin nthdat" : "🎧 Thưởng thức âm nhạc cùng mọi người";
                
                if (myRole === 'admin') {
                    document.getElementById('admin-tools').classList.remove('hidden');
                    document.getElementById('player-container').style.pointerEvents = 'auto';
                }
                
                initialVideoId = res.currentVideoId;
                if (player && player.loadVideoById) {
                    player.loadVideoById(initialVideoId);
                    player.pauseVideo();
                }
                updatePlaylistUI(res.playlist);
            } else {
                alert(res.message);
            }
        });

        // --- HÀM CHAT ---
        function sendChat() {
            const input = document.getElementById('chat-input');
            if(input.value.trim() !== "") {
                socket.emit('sendMessage', input.value);
                input.value = '';
            }
        }

        socket.on('newMessage', (data) => {
            const chatBox = document.getElementById('chat-box-ui');
            chatBox.innerHTML += `<div class="chat-message"><strong>${data.name}:</strong> ${data.text}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // --- YOUTUBE API PLAYER ---
        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : url;
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '100%', width: '100%', videoId: initialVideoId,
                playerVars: { 'controls': 0, 'disablekb': 1, 'origin': window.location.origin },
                events: {
                    'onReady': () => { player.setVolume(50); document.getElementById('status').innerText = "Trạm phát sẵn sàng! 🟢"; },
                    'onStateChange': (e) => {
                        if (myRole === 'admin') {
                            if (e.data == YT.PlayerState.PLAYING) socket.emit('adminPlay', player.getCurrentTime());
                            if (e.data == YT.PlayerState.PAUSED) socket.emit('adminPause');
                            if (e.data == YT.PlayerState.ENDED) socket.emit('adminNextSong');
                        }
                    }
                }
            });
        }

        function changeVolume(val) { if (player && player.setVolume) player.setVolume(val); }
        function addSong() {
            const input = document.getElementById('song-input');
            if (input.value) { socket.emit('adminAddSong', extractVideoID(input.value)); input.value = ''; }
        }
        function nextSong() { socket.emit('adminNextSong'); }

        socket.on('updatePlaylist', (list) => { updatePlaylistUI(list); });
        socket.on('changeVideo', (id) => { if (player && player.loadVideoById) player.loadVideoById(id); });
        
        function updatePlaylistUI(list) {
            const ul = document.getElementById('playlist-ui');
            ul.innerHTML = list.length === 0 ? '<li>Chưa có bài nào chờ.</li>' : list.map((id, i) => `<li>🎵 Bài ${i+1}: [ID: ${id}]</li>`).join('');
        }

        socket.on('memberPlay', (time) => { if (myRole === 'member' && player) { if (Math.abs(player.getCurrentTime() - time) > 1) player.seekTo(time); player.playVideo(); }});
        socket.on('memberPause', () => { if (myRole === 'member' && player) player.pauseVideo(); });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trạm Nhạc Live & Chat 🫪</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #e8f5e9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 650px;
            text-align: center;
        }

        /* Giao diện Đăng nhập */
        .login-box {
            padding: 20px;
        }

        input[type="text"],
        input[type="password"] {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #2e7d32;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }

        button:hover {
            background-color: #1b5e20;
            transform: scale(1.02);
        }

        .hidden {
            display: none !important;
        }

        /* Giao diện chính sau khi vào phòng */
        #status {
            font-weight: bold;
            color: #555;
        }

        #player-container {
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
            pointer-events: none;
        }

        .control-panel {
            margin-top: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            text-align: left;
        }

        /* Khung Chat */
        .chat-section {
            margin-top: 20px;
            text-align: left;
        }

        .chat-box {
            background: #fafafa;
            border: 1px solid #ddd;
            height: 180px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .chat-input-row {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        #chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .playlist-box {
            background: white;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ddd;
            max-height: 80px;
            overflow-y: auto;
            font-size: 13px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            padding: 4px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🎵 Trạm Phát Nhạc & Chat Live 🫪</h2>

        <div id="login-section" class="login-box">
            <p>Vui lòng điền tên của bạn để tham gia phòng:</p>

            <input type="text" id="username-input" placeholder="Nhập tên của bạn vào đây..."
                oninput="checkAdminName(this.value)" required>

            <div id="password-wrapper" class="hidden">
                <input type="password" id="password-input" placeholder="Ôi chao! Admin đây rồi, nhập mật khẩu nhé! 😎">
            </div>

            <button onclick="joinRoom()">Vào Phòng Nghe Nhạc 🫪</button>
        </div>

        <div id="main-room" class="hidden">
            <h3 id="welcome-title"></h3>
            <p id="status">Đang tải trình phát YouTube...</p>

            <div id="player-container">
                <div id="youtube-player"></div>
            </div>

            <div class="control-panel">
                <div style="display:flex; justify-content: space-between; align-items:center;">
                    <label>🔊 Âm lượng: <input type="range" id="volume-slider" min="0" max="100" value="50"
                            oninput="changeVolume(this.value)"></label>
                </div>

                <div id="admin-tools" class="hidden" style="margin-top: 10px; display: flex; gap: 5px;">
                    <input type="text" id="song-input" placeholder="Dán link YouTube..."
                        style="flex:1; padding: 5px; border-radius: 5px; border:1px solid #ccc;">
                    <button onclick="addSong()"
                        style="background-color: #f57c00; padding: 5px 10px; margin-top: 0;">Thêm</button>
                    <button onclick="nextSong()"
                        style="background-color: #388e3c; padding: 5px 10px; margin-top: 0;">Qua Bài ⏭️</button>
                </div>

                <h4 style="margin: 10px 0 5px 0;">📝 Danh Sách Chờ</h4>
                <div class="playlist-box">
                    <ul id="playlist-ui">
                        <li>Trống</li>
                    </ul>
                </div>
            </div>

            <div class="chat-section">
                <h4>💬 Phòng Trò Chuyện Chéo</h4>
                <div class="chat-box" id="chat-box-ui"></div>
                <div class="chat-input-row">
                    <input type="text" id="chat-input" placeholder="Nhập tin nhắn..."
                        onkeypress="if(event.key === 'Enter') sendChat()">
                    <button onclick="sendChat()" style="background-color: #0288d1; margin-top: 0;">Gửi</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        const socket = io();
        let player;
        let myRole = '';
        let initialVideoId = 'jfKfPfyJRdk';

        // Tự động kiểm tra tên để hiện mật khẩu
        function checkAdminName(name) {
            // Dùng toLowerCase() để dù nhập nthdat hay NTHDAT thì đều hiểu là ông chủ
            if (name.trim().toLowerCase() === 'nthdat') {
                document.getElementById('password-wrapper').classList.remove('hidden');
            } else {
                document.getElementById('password-wrapper').classList.add('hidden');
                document.getElementById('password-input').value = ''; // Xóa trắng mật khẩu nếu đổi tên khác
            }
        }

        // Gửi thông tin đăng nhập lên server
        function joinRoom() {
            const name = document.getElementById('username-input').value;
            const password = document.getElementById('password-input').value;
            const isAdmin = name.trim().toLowerCase() === 'nthdat';

            if (!name.trim()) {
                alert("Vui lòng nhập tên trước đã nha ông chủ! 🫪");
                return;
            }

            socket.emit('joinRoom', { name, isAdmin, password });
        }

        // Nhận kết quả xác thực từ server
        socket.on('authResult', (res) => {
            if (res.success) {
                myRole = res.role;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-room').classList.remove('hidden');
                document.getElementById('welcome-title').innerText = myRole === 'admin' ? "👑 Bảng Điều Khiển Của Admin nthdat" : "🎧 Thưởng thức âm nhạc cùng mọi người";

                if (myRole === 'admin') {
                    document.getElementById('admin-tools').classList.remove('hidden');
                    document.getElementById('player-container').style.pointerEvents = 'auto';
                }

                initialVideoId = res.currentVideoId;
                if (player && player.loadVideoById) {
                    player.loadVideoById(initialVideoId);
                    player.pauseVideo();
                }
                updatePlaylistUI(res.playlist);
            } else {
                alert(res.message);
            }
        });

        // --- HÀM CHAT ---
        function sendChat() {
            const input = document.getElementById('chat-input');
            if (input.value.trim() !== "") {
                socket.emit('sendMessage', input.value);
                input.value = '';
            }
        }

        socket.on('newMessage', (data) => {
            const chatBox = document.getElementById('chat-box-ui');
            chatBox.innerHTML += `<div><strong>${data.name}:</strong> ${data.text}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // --- YOUTUBE API PLAYER ---
        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : url;
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '220', width: '100%', videoId: initialVideoId,
                playerVars: { 'controls': 0, 'disablekb': 1, 'origin': window.location.origin },
                events: {
                    'onReady': () => { player.setVolume(50); document.getElementById('status').innerText = "Trạm phát sẵn sàng! 🟢"; },
                    'onStateChange': (e) => {
                        if (myRole === 'admin') {
                            if (e.data == YT.PlayerState.PLAYING) socket.emit('adminPlay', player.getCurrentTime());
                            if (e.data == YT.PlayerState.PAUSED) socket.emit('adminPause');
                            if (e.data == YT.PlayerState.ENDED) socket.emit('adminNextSong');
                        }
                    }
                }
            });
        }

        function changeVolume(val) { if (player && player.setVolume) player.setVolume(val); }
        function addSong() {
            const input = document.getElementById('song-input');
            if (input.value) { socket.emit('adminAddSong', extractVideoID(input.value)); input.value = ''; }
        }
        function nextSong() { socket.emit('adminNextSong'); }

        socket.on('updatePlaylist', (list) => { updatePlaylistUI(list); });
        socket.on('changeVideo', (id) => { if (player && player.loadVideoById) player.loadVideoById(id); });

        function updatePlaylistUI(list) {
            const ul = document.getElementById('playlist-ui');
            ul.innerHTML = list.length === 0 ? '<li>Chưa có bài nào chờ.</li>' : list.map((id, i) => `<li>🎵 Bài ${i + 1}: [ID: ${id}]</li>`).join('');
        }

        socket.on('memberPlay', (time) => { if (myRole === 'member' && player) { if (Math.abs(player.getCurrentTime() - time) > 1) player.seekTo(time); player.playVideo(); } });
        socket.on('memberPause', () => { if (myRole === 'member' && player) player.pauseVideo(); });
    </script>
</body>

</html>
